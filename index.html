<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
    <script src="gallery.js"></script>
</head>
<body>
    <div id="image">
        Hover over an image below to display here.
    </div>
    
    <img class="preview" alt="Baking" src="https://images.unsplash.com/photo-1509440159596-0249088772ff?w=500" onmouseover="upDate(this)" onmouseout="unDo()">
    
    <img class="preview" alt="Working" src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=500" onmouseover="upDate(this)" onmouseout="unDo()">
    
    <img class="preview" alt="Landscape" src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500" onmouseover="upDate(this)" onmouseout="unDo()">
</body>
</html>
